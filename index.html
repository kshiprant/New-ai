<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Buddy</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<div class="app">

  <!-- HEADER -->
  <header class="top-bar">
    <div class="title">AI Buddy</div>
    <select id="character">
      <option value="bot">Bot</option>
      <option value="female">Female</option>
      <option value="me">Me</option>
      <option value="luffy">Pirate</option>
    </select>
  </header>

  <!-- CHAT -->
  <div id="chat">
    <div id="messages"></div>
  </div>

  <!-- INPUT -->
  <div class="input-bar">
    <input id="input" placeholder="Ask anything…" />
    <button onclick="send()">➤</button>
  </div>

  <!-- FOOTER -->
  <footer class="credit">
    Developed by <span>Kshiprant</span>
  </footer>

</div>

<script src="script.js"></script>
</body>
</html>
